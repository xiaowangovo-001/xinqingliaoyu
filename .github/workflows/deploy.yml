name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Create API key file
        run: |
          mkdir -p lib/ai
          echo "export const DEEPSEEK_API_KEY = '${{ secrets.DEEPSEEK_API_KEY }}';" > lib/ai/api-key.ts
          echo "export const DEEPSEEK_BASE_URL = 'https://api.deepseek.com';" >> lib/ai/api-key.ts

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx next build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
